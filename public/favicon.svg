<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <clipPath id="rounded-rect">
      <rect width="64" height="64" rx="14"/>
    </clipPath>
    <linearGradient id="split" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <!-- Background with diagonal gradient -->
  <rect width="64" height="64" rx="14" fill="url(#split)"/>
  <!-- Subtle divider line -->
  <line x1="0" y1="0" x2="64" y2="64" stroke="rgba(255,255,255,0.15)" stroke-width="0.75" clip-path="url(#rounded-rect)"/>
  <!-- PR monogram -->
  <text
    x="32"
    y="44"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="26"
    font-weight="700"
    letter-spacing="-1"
    fill="#ffffff"
    text-anchor="middle"
  >PR</text>
</svg>
